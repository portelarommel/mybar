
<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Controle da Cozinha</title>
    <link rel="stylesheet" th:href="@{/css/gestaoEstilo.css}">
</head>
 
<body>
 
    <div class="container">
 
        <h2>Pesquisa por Contas</h2>
        <form th:action="@{/cozinha}" method="GET">
            <div class="pesquisa-grid">
                <div class="form-group">
                    <label for="numeroConta">Número Conta</label>
                    <input type="text" id="numeroConta" name="numeroConta"
                           placeholder="120 (número com até 4 dígitos)" maxlength="4"
                           th:value="${param.numeroConta}">
                </div>
 
                <div class="form-group">
                    <label for="statusItem">Status</label>
                    <!-- name precisa ser "statusItem" para bater com o @RequestParam do controller -->
                    <select id="statusItem" name="statusItem">
                        <option value="">Selecione o status...</option>
                        <option value="SOLICITADO"
                                th:selected="${param.statusItem != null and param.statusItem[0] == 'SOLICITADO'}">
                            Solicitado
                        </option>
                        <option value="RECEBIDO"
                                th:selected="${param.statusItem != null and param.statusItem[0] == 'RECEBIDO'}">
                            Recebido
                        </option>
                        <option value="ENTREGUE"
                                th:selected="${param.statusItem != null and param.statusItem[0] == 'ENTREGUE'}">
                            Entregue
                        </option>
                    </select>
                </div>
            </div>
 
            <div class="buttons-bar">
                <button type="submit" class="btn btn-pesquisar">Pesquisar</button>
            </div>
        </form>
 
        <h2>Pedidos para a Cozinha</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Conta</th>
                        <th>Tipo</th>
                        <th>Descrição</th>
                        <th>Data e Hora</th>
                        <th>Status</th>
                        <th>Comandos</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${itens == null or itens.isEmpty()}">
                        <td colspan="6" style="text-align:center;">Nenhum pedido encontrado.</td>
                    </tr>
 
                    <tr th:each="item : ${itens}">
                        <td th:text="${item.codigoConta}">120</td>
                        <td th:text="${item.tipo}">Bebida</td>
                        <td th:text="${item.descricao}">Cerveja</td>
                        <td th:text="${#temporals.format(item.dataHora, 'dd/MM/yyyy HH:mm')}">01/01/2026 12:00</td>
                        <td th:text="${item.status}">Solicitado</td>
                        <td>
                            <form th:if="${item.status.name() == 'SOLICITADO'}"
                                  th:action="@{/cozinha/{id}/receber(id=${item.id})}" method="POST">
                                <button type="submit" class="btn btn-receber">Receber</button>
                            </form>
                            <form th:if="${item.status.name() == 'RECEBIDO'}"
                                  th:action="@{/cozinha/{id}/registrar(id=${item.id})}" method="POST">
                                <button type="submit" class="btn btn-entregar">Registrar Entrega</button>
                            </form>
                            <span th:if="${item.status.name() == 'ENTREGUE'}">—</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
 
    </div>
 
</body>
 
</html>
