<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Login</title>
     <link rel="stylesheet" th:href="@{/css/indexEstilo.css}">
</head>
<body>
     <div class="login-container">
        <div class="login-header">
            <h1>MyBar</h1>
            <p>Gerenciador de Bares e Restaurantes</p>
        </div>

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Ex: joao@limao.com" 
                    required
                 >
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input 
                    type="password" 
                    id="senha" 
                    name="senha" 
                    placeholder="Digite sua senha" 
                    required
                >
            </div>

            <button type="submit" class="btn-login">Entrar</button>
            
        </form>
    </div>

</body>
</html>
