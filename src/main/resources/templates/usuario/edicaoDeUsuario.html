<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Edição de Usuário</title>
    <link rel="stylesheet" th:href="@{/css/novoOuAlteraObjetoEstilo.css}">
</head>
<body>

    <div class="page-centralizada">
        
        <div class="container">
            <h2>Tela de Edição de Usuário</h2>

            <form th:action="@{/usuarios/{id}/editar(id=${usuario.id})}" th:object="${usuario}" method="POST">
                
                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label for="codigo">Código</label>
                    <input type="text" id="codigo" th:value="${usuario.codigo}" name="codigo" 
                           readonly="readonly" placeholder="Código do usuário">
                </div>

                <div class="form-group">
                    <label for="nome">Nome <span class="required">*</span></label>
                    <input type="text" id="nome" th:field="*{nome}" required 
                           maxlength="255" placeholder="Ex: João Limão">
                </div>

                <div class="form-group">
                    <label for="tipoUsuario">Tipo <span class="required">*</span></label>
                    <select id="tipoUsuario" th:field="*{tipo}" required>
                        <option value="">Selecione o tipo...</option>
                        <option value="ADMINISTRADOR">Administrador</option>
                        <option value="COZINHA">Cozinha</option>
                        <option value="GARCOM">Garçom</option>
                        <option value="ATENDENTE_BALCAO">Atendente Balcão</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" th:field="*{email}" required 
                           placeholder="Ex: joao@limao.com">
                </div>

                <div class="form-group">
                    <label for="senha">Senha <span class="required">*</span></label>
                     <input type="password" id="senha" 
       th:value="${usuario.senha}" 
       name="senha" 
       required pattern="[0-9]{4}" maxlength="4">
                </div>

                <div class="buttons-bar">
                    <button type="submit" class="btn-salvar">&lt; Salvar Alterações &gt;</button>
                    <a th:href="@{/usuarios}" style="display: block; margin-top: 15px; color: #4b5563; font-size: 14px; text-decoration: underline;">Voltar para Gestão de Usuários</a>
                </div>
                
                <div class="footer-note">
                    Os campos marcados com <span class="required">*</span> são de preenchimento obrigatório.
                </div>
            </form>
            
        </div>

    </div>

</body>
</html>
