<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Tela de Edição de Usuário</title>
    <link rel="stylesheet" th:href="@{/css/novoOuAlteraObjetoEstilo.css}">
</head>
<body>

    <div class="page-centralizada">
        
        <div class="container">
            <h2>Tela de Edição de Usuário</h2>
            
            <form action="#" method="POST">
                
                <div class="form-group">
                    <label for="codigo">Código</label>
                    <input type="text" id="codigo" name="codigo" readonly placeholder="Código do usuário">
                </div>

                <div class="form-group">
                    <label for="nome">Nome <span class="required">*</span></label>
                    <input type="text" id="nome" name="nome" required 
                           maxlength="255" placeholder="Texto com até 255 caracteres">
                </div>

                <div class="form-group">
                    <label for="tipoUsuario">Tipo <span class="required">*</span></label>
                    <select id="tipoUsuario" name="tipoUsuario" required>
                        <option value="">Selecione o tipo...</option>
                        <option value="Administrador">Administrador</option>
                        <option value="Cozinha">Cozinha</option>
                        <option value="Garçom">Garçom</option>
                        <option value="Atendente Balcão">Atendente Balcão</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" required placeholder="e-mail válido">
                </div>

                <div class="form-group">
                    <label for="senha">Senha <span class="required">*</span></label>
                    <input type="password" id="senha" name="senha" required 
                           pattern="[0-9]{4}" maxlength="4" placeholder="número com 4 dígitos">
                </div>

                <div class="buttons-bar">
                    <button type="submit" class="btn-salvar">&lt; Salvar &gt;</button>
                    <a href="/usuarios" style="display: block; margin-top: 15px; color: #4b5563; font-size: 14px; text-decoration: underline;">Voltar para Gestão de Usuários</a>
                </div>
                
                <div class="footer-note">
                    Os campos marcados com <span class="required">*</span> são de preenchimento obrigatório.
                </div>
                
            </form>
        </div>

    </div>

</body>
</html>

</body>
</html>
