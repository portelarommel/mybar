<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Tela de Edição Conta</title>
    <style>
        /* --- ESTILOS PADRÃO E RESET --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 20px;
            color: #111;
            margin-bottom: 25px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
            text-align: center;
        }

        /* --- CAMPOS DO FORMULÁRIO --- */
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: bold;
            color: #4b5563;
            margin-bottom: 6px;
        }

        .form-group label .required {
            color: #ef4444;
            margin-left: 2px;
        }

        .form-group input, .form-group select {
            padding: 11px 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #d97706; /* Foco com a cor do sistema */
        }

        /* Campo desabilitado/somente leitura para edição posterior */
        .form-group input[readonly] {
            background-color: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
        }

        /* --- CONTAINER DE BOTÕES --- */
        .buttons-bar {
            margin-top: 30px;
            text-align: center;
        }

        .btn-salvar {
            background-color: #991b1b; /* Tom âmbar condizente com bar */
            color: white;
            font-size: 16px;
            font-weight: bold;
            border: none;
            padding: 12px 40px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        .btn-salvar:hover {
            background-color: #7f1d1d;
        }

        /* Pequena linha explicativa de rodapé */
        .footer-note {
            font-size: 12px;
            color: #6b7280;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Tela de Edição Conta</h2>
        
        <form action="#" method="POST">
            
            <div class="form-group">
                <label for="cpf">CPF<span class="required">*</span></label>
                <input type="text" id="cpf" name="cpf" placeholder="123.456.789-10" required readonly>
            </div>

            <div class="form-group">
                <label for="nome">Nome<span class="required">*</span></label>
                <input type="text" id="nome" name="nome" placeholder="Nome do cliente" maxlength="255" required>
            </div>

            <div class="form-group">
                <label for="celular">Celular<span class="required">*</span></label>
                <input type="tel" id="celular" name="celular" placeholder="86 98888-8888" pattern="[0-9]{2} [0-9]{5}-[0-9]{4}" required>
            </div>

            <div class="form-group">
                <label for="sexo">Sexo<span class="required">*</span></label>
                <select id="sexo" name="sexo" required>
                    <option value="">Selecione...</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                </select>
            </div>

            <div class="form-group">
                <label for="data">Data<span class="required">*</span></label>
                <input type="date" id="data" name="data" required>
            </div>

            <div class="form-group">
                <label for="hora">Hora<span class="required">*</span></label>
                <input type="time" id="hora" name="hora" required>
            </div>

            <div class="form-group">
                <label for="numeroConta">Número Conta<span class="required">*</span></label>
                <input type="number" id="numeroConta" name="numeroConta" placeholder="Ex: 120" min="1" max="999" required>
            </div>

            <div class="form-group">
                <label for="codigoGarcom">Código Garçom<span class="required">*</span></label>
                <input type="text" id="codigoGarcom" name="codigoGarcom" placeholder="Ex: 1010" pattern="[0-9]{4}" maxlength="4" required>
            </div>

            <div class="form-group">
                <label for="senha">Senha<span class="required">*</span></label>
                <input type="password" id="senha" name="senha" placeholder="Senha de 4 dígitos" pattern="[0-9]{4}" maxlength="4" required>
            </div>

            <div class="buttons-bar">
                <button type="submit" class="btn-salvar">Salvar</button>
            </div>

            <p class="footer-note">Campos marcados com <span style="color: #ef4444;">*</span> são obrigatórios.</p>
        </form>
    </div>

</body>
</html>
