<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Tela de Edição Conta</title>
    <link rel="stylesheet" th:href="@{/css/novoOuAlteraObjetoEstilo.css}">
    <style>
        .btn-voltar {
            display: inline-block;
            background-color: #2563eb;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 25px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }
        .btn-voltar:hover {
            background-color: #1d4ed8;
        }

        /* Garante o feedback visual cinza de campo bloqueado */
        input[readonly], select[disabled] {
            background-color: #f3f4f6;
            color: #4b5563;
            cursor: not-allowed;
        }
    </style>

</head>
<script th:src="@{/js/mensagens.js}"></script>
<body>
    <div class="page-centralizada">
        <div class="container">
        <h2>Tela de Edição Conta</h2>
            <div id="mensagem"
                th:if="${mensagem}"
                th:data-texto="${mensagem}"
                th:data-tipo="${tipo}">
            </div>
        
<form th:action="@{''}" th:object="${contaDto}" method="POST">
    
        <div class="form-group">
            <label for="cpf">CPF<span class="required">*</span></label>
            <input
                type="text"
                id="cpf"
                th:field="*{cpfCliente}"
                readonly> </div>

        <div class="form-group">
            <label for="nome">Nome<span class="required">*</span></label>
            <input
                type="text"
                id="nome"
                th:field="*{nomeCliente}"
                maxlength="255"
                required>
        </div>

        <div class="form-group">
            <label for="celular">Celular<span class="required">*</span></label>
            <input
                type="tel"
                id="celular"
                th:field="*{celularCliente}"
                required>
        </div>

        <div class="form-group">
            <label for="sexo">Sexo<span class="required">*</span></label>
            <select id="sexo" th:field="*{sexoCliente}" required>
                <option value="">Selecione...</option>
                <option value="MASCULINO">Masculino</option>
                <option value="FEMININO">Feminino</option>
            </select>
        </div>
        <div class="form-group">
            <label for="data">Data de Abertura<span class="required">*</span></label>
                <input
                    type="text"
                    id="data"
                    name="data"
                    th:value="${#temporals.format(contaDto.data, 'dd-MM-yyyy')}"
                    placeholder="dd-mm-aaaa"
                    required>
        </div>
        <div class="form-group">
            <label for="hora">Hora de Abertura<span class="required">*</span></label>
            <input
                type="text"
                id="hora"
                name="hora"
                th:value="${#temporals.format(contaDto.hora, 'HH:mm')}"
                placeholder="HH:mm"
                required>
        </div>

        <div class="form-group">
            <label for="numeroConta">Número da Conta<span class="required">*</span></label>
            <input
                type="number"
                id="numeroConta"
                th:field="*{numeroConta}"
                min="1"
                max="9999"
                required>
        </div>

        <div class="form-group">
            <label for="codigoGarcom">Código do Garçom<span class="required">*</span></label>
            <input
                type="text"
                id="codigoGarcom"
                th:field="*{codigoGarcom}"
                placeholder="Ex: 1010"
                pattern="[0-9]{4}"
                maxlength="4"
                required>
        </div>

        <div class="form-group">
            <label for="senha">Senha<span class="required">*</span></label>
            <input
                type="password"
                id="senha"
                th:field="*{senha}"
                placeholder="Senha de 4 dígitos"
                pattern="[0-9]{4}"
                maxlength="4"
                required>
        </div>

        <div class="buttons-bar">
            <button type="submit" class="btn-salvar">Salvar</button>
        </div>
        <div class="buttons-bar">
            <a th:href="@{/contas}" class="btn-voltar">
                Voltar para Gestão
            </a>
        </div>

        <p class="footer-note">Campos marcados com <span style="color: #ef4444;">*</span> são obrigatórios.</p>
    </form>
        </div>
    </div>

</body>
</html>
