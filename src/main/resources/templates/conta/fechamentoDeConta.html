<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Fechamento de Conta</title>
    <link rel="stylesheet" th:href="@{/css/novoOuAlteraObjetoEstilo.css}">
    <link rel="stylesheet" th:href="@{/css/gestaoEstilo.css}">
    
 <style>
        /* Pequenos ajustes de layout específicos desta tela */
        .grid-3-colunas {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }
        .grid-2-colunas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin: 25px 0 15px 0;
            color: #111111;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 5px;
        }
        .tables-vertical-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin-top: 20px;
            margin-bottom: 30px;
        }
        input[readonly] {
            background-color: #f3f4f6;
            color: #4b5563;
            cursor: not-allowed;
        }

        /* NOVA REGRA ADICIONADA AQUI */
        #valorTotal, #totalPagamentos {
            font-size: 18px;
            font-weight: bold;
            padding: 12px 15px;
            color: #1f2937;
        }
    </style>
</head>
<body>

    <div class="container" style="max-width: 1000px; margin: 0 auto; padding: 20px;">
        <h2>Fechamento de Conta</h2>

        <form th:action="@{/contas/{id}/fechar(id=${id})}" method="POST">
            
            <div class="grid-3-colunas">
                <div class="form-group">
                    <label for="numero">Número <span class="required">*</span></label>
                    <input type="text" id="numero" name="numero" th:value="${contaDto.numeroConta}" readonly required>
                </div>
                <div class="form-group">
                    <label for="cpf">CPF <span class="required">*</span></label>
                    <input type="text" id="cpf" name="cpf" th:value="${contaDto.cpfCliente}" readonly required>
                </div>
                <div class="form-group">
                    <label for="nome">Nome <span class="required">*</span></label>
                    <input type="text" id="nome" name="nome" th:value="${contaDto.nomeCliente}" readonly required>
                </div>
            </div>

            <div class="grid-2-colunas">
                <div class="form-group">
                    <label for="valorTotal">Valor Total <span class="required">*</span></label>
                    <input type="text" id="valorTotal" name="valorTotal" th:value="|R$ ${#numbers.formatDecimal(totalConta ?: 0, 1, 2, 'COMMA')}|" readonly required>
                </div>
                <div class="form-group">
                    <label for="totalPagamentos">Total de Pagamentos <span class="required">*</span></label>
                    <input type="text" id="totalPagamentos" name="totalPagamentos" th:value="|R$ ${#numbers.formatDecimal(totalPago ?: 0, 1, 2, 'COMMA')}|" readonly required>
                </div>
            </div>

            <div class="section-title">Lançar Recebimento / Pagamento</div>

            <div class="grid-2-colunas">
                <div class="form-group">
                    <label for="valorPago">Valor Pago <span class="required">*</span></label>
                    <input type="text" id="valorPago" name="valorPago" placeholder="R$ 0,00 (Dinheiro, Pix...)" required>
                </div>
                <div class="form-group">
                    <label for="formaPagamento">Forma de Pagamento <span class="required">*</span></label>
                    <select id="formaPagamento" name="formaPagamento" required>
                        <option value="">Selecione...</option>
                        <option value="Crédito">Crédito</option>
                        <option value="Débito">Débito</option>
                        <option value="Pix">Pix</option>
                        <option value="Espécie">Espécie</option>
                    </select>
                </div>
            </div>

            <div class="grid-2-colunas">
                <div class="form-group">
                    <label for="codigoGarcom">Código Garçom <span class="required">*</span></label>
                    <input type="text" id="codigoGarcom" name="codigoGarcom" placeholder="9999" pattern="[0-9]{4}" maxlength="4" required>
                </div>
                <div class="form-group">
                    <label for="senhaGarcom">Senha <span class="required">*</span></label>
                    <input type="password" id="senhaGarcom" name="senhaGarcom" placeholder="9999" pattern="[0-9]{4}" maxlength="4" required>
                </div>
            </div>

            <div class="buttons-bar" style="margin-top: 20px; text-align: left;">
                <button type="submit" class="btn btn-nova-conta" style="background-color: #2563eb;">&lt; Inserir Pagamento &gt;</button>
            </div>
        </form>

        <div class="tables-vertical-wrapper">
            
            <div class="table-responsive">
                <div class="section-title">Itens na Conta</div>
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="width: 20%;">Código</th>
                            <th style="width: 50%;">Descrição</th>
                            <th style="width: 15%;">Quant</th>
                            <th style="width: 15%;">Valor</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${itensDaConta}">
                            <td th:text="${item.itemCardapio != null ? item.itemCardapio.id : '-'}">001</td>
                            <td th:text="${item.itemCardapio != null ? item.itemCardapio.nome : 'Item de Consumo'}">Item</td>
                            <td th:text="${item.quantidade}">1</td>
                            <td th:text="|R$ ${#numbers.formatDecimal(item.valor ?: 0, 1, 2, 'COMMA')}|">R$ 0,00</td>
                        </tr>
                        
                        <tr style="background-color: #f9fafb; font-style: italic; border-top: 1px solid #e5e7eb;">
                            <td>-</td>
                            <td>Taxa de Ingresso</td>
                            <td>1</td>
                            <td th:text="|R$ ${#numbers.formatDecimal(valorIngresso ?: 0, 1, 2, 'COMMA')}|">R$ 0,00</td>
                        </tr>
                        
                        <tr th:if="${valorGorjeta != null}" style="background-color: #f9fafb; font-style: italic;">
                            <td>-</td>
                            <td>Taxa de Serviço (Gorjeta)</td>
                            <td>1</td>
                            <td th:text="|R$ ${#numbers.formatDecimal(valorGorjeta ?: 0, 1, 2, 'COMMA')}|">R$ 0,00</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="table-responsive">
                <div class="section-title">Pagamentos Efetuados</div>
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="width: 30%;">Forma</th>
                            <th style="width: 20%;">Valor</th>
                            <th style="width: 50%;">Comandos</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>

        </div>

        <div class="buttons-bar" style="text-align: right; border-top: 1px solid #e5e7eb; padding-top: 20px;">
            <form th:action="@{/contas/{id}/fechar}" method="POST" style="display: inline;">
                <button type="submit" class="btn btn-pesquisar" style="background-color: #991b1b; padding: 12px 30px; font-size: 16px; cursor: pointer;">
                    &lt; Concluir Fechamento &gt;
                </button>
            </form>
        </div>

    </div>
</body>
</html>
