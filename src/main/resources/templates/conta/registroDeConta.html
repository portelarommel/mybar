<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Tela de Registro de Conta</title>
    <link rel="stylesheet" href="/css/novoOuAlteraObjetoEstilo.css">
</head>
<body>
    <div class="page-centralizada">
        <div class="container">
        <h2>Tela de Registro de Conta</h2>
        
        <form action="#" method="POST">
            
            <div class="form-group">
                <label for="cpf">CPF <span class="required">*</span></label>
                <input type="text" id="cpf" name="cpf" required 
                       placeholder="123.456.789-10">
            </div>

            <div class="form-group">
                <label for="nome">Nome <span class="required">*</span></label>
                <input type="text" id="nome" name="nome" required maxlength="255" placeholder="Ex: Raimundo Moura">
            </div>

            <div class="form-group">
                <label for="celular">Celular <span class="required">*</span></label>
                <input type="text" id="celular" name="celular" required placeholder="86 98888-8888">
            </div>
            
            <div class="form-group">
                <label for="sexo">Sexo <span class="required">*</span></label>
                <select id="sexo" name="sexo" required>
                    <option value="">[Selecione]</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                </select>
            </div>

            <div class="form-group">
                <label for="data">Data <span class="required">*</span></label>
                <input type="text" id="data" name="data" required placeholder="dd/mm/aaaa">
            </div>

            <div class="form-group">
                <label for="hora">Hora <span class="required">*</span></label>
                <input type="text" id="hora" name="hora" required placeholder="99:99">
            </div>

            <div class="form-group">
                <label for="numeroConta">Número Conta <span class="required">*</span></label>
                <input type="text" id="numeroConta" name="numeroConta" required placeholder="Ex: 120">
            </div>

            <div class="form-group">
                <label for="codigo">Código</label>
                <input type="text" id="codigo" name="codigo" placeholder="Ex: 1010">
            </div>

            <div class="form-group">
                <label for="garcom">Garçom <span class="required">*</span></label>
                <input type="text" id="garcom" name="garcom" required placeholder="Nome do Garçom">
            </div>

            <div class="form-group">
                <label for="senha">Senha <span class="required">*</span></label>
                <input type="password" id="senha" name="senha" required placeholder="9999 (4 dígitos)">
            </div>

            <div class="buttons-bar">
                <button type="submit" class="btn-salvar">&lt; Salvar &gt;</button>
                <a href="/gestaodeconta" style="display: block; margin-top: 15px; color: #4b5563; font-size: 14px; text-decoration: underline;">Voltar</a>
            </div>
            
            <div class="footer-note">
                Os campos marcados com <span class="required">*</span> são de preenchimento obrigatório.
            </div>
            
        </form>
        </div>
    </div>


</body>
</html>
