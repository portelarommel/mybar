<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Registro de Contas</title>
    <style>
        /* --- ESTILOS PADRÃO E RESET --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 22px;
            color: #111;
            margin-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
        }

        /* --- SEÇÃO DE PESQUISA (FORMULÁRIO) --- */
        .pesquisa-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 14px;
            font-weight: bold;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
            width: 100%;
        }

        .buttons-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-pesquisar {
            background-color: #991b1b; /* Tom âmbar */
            color: white;
        }

        .btn-pesquisar:hover {
            background-color: ;
        }

        .btn-nova-conta {
            background-color: #2563eb; /* Azul */
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-nova-conta:hover {
            background-color: #1d4ed8;
        }

        /* --- SEÇÃO DA TABELA DE RESULTADOS --- */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 15px;
        }

        th, td {
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: bold;
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        /* --- BOTÕES DE COMANDO DA TABELA --- */
        .actions-cell {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .btn-action {
            padding: 5px 10px;
            font-size: 12px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 3px;
            color: white;
        }

        .btn-view { background-color: #64748b; }
        .btn-view:hover { background-color: #475569; }

        .btn-edit { background-color: #0ea5e9; }
        .btn-edit:hover { background-color: #0284c7; }

        .btn-delete { background-color: #ef4444; }
        .btn-delete:hover { background-color: #dc2626; }

        .btn-item { background-color: #10b981; }
        .btn-item:hover { background-color: #059669; }

        .btn-close { background-color: #8b5cf6; }
        .btn-close:hover { background-color: #7c3aed; }
    </style>
</head>
<body>

    <div class="container">
        
        <h2>Pesquisa por Contas</h2>
        <form action="#" method="GET">
            <div class="pesquisa-grid">
                <div class="form-group">
                    <label for="numeroConta">Número Conta</label>
                    <input type="text" id="numeroConta" name="numeroConta" placeholder="Ex: 120" maxlength="4">
                </div>
                
                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="123.456.789-10">
                </div>
                
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" placeholder="Nome do cliente" maxlength="255">
                </div>
                
                <div class="form-group">
                    <label for="aberta">Aberta?</label>
                    <select id="aberta" name="aberta">
                        <option value="">Selecione...</option>
                        <option value="Sim">Sim</option>
                        <option value="Não">Não</option>
                    </select>
                </div>
            </div>
            
            <div class="buttons-bar">
                <button type="submit" class="btn btn-pesquisar">Pesquisar</button>
                <a href="#" class="btn btn-nova-conta">Nova Conta</a>
            </div>
        </form>

        <h2>Tabela de Contas Registradas</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>CPF</th>
                        <th>Nome</th>
                        <th>Celular</th>
                        <th>Número</th>
                        <th>Aberta?</th>
                        <th>Comandos</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>

    </div>

</body>
</html>
