<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Registro de Contas</title>
     <link rel="stylesheet" th:href="@{/css/gestaoEstilo.css}">
</head>
<script th:src="@{/js/mascaras.js}"></script>

<body>

    <div class="container">
        
        <h2>Pesquisa por Contas</h2>
        <form id="formPesquisa" th:action="@{/contas}" method="GET">
            <div class="pesquisa-grid">
                <div class="form-group">
                    <label for="numeroConta">Número Conta</label>
                    <input type="text" id="numeroConta" name="numeroConta" placeholder="Ex: 120" maxlength="4">
                </div>
                
                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input
                        type="text"
                        id="cpf"
                        name="cpf"
                        placeholder="000.000.000-00"
                        maxlength="14">
                </div>
                
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nomeCliente" placeholder="Nome do cliente" maxlength="255">
                </div>
                <div class="form-group">
                    <label for="aberta">Aberta?</label>
                    <select id="aberta" name="aberta">
                    <option value="">Selecione...</option>
                    <option value="true">Sim</option> <option value="false">Não</option> </select>
                </div>
            </div>
            
            <div class="buttons-bar">
                <button type="submit" class="btn btn-pesquisar">Pesquisar</button>
                <a th:href="@{/contas/registrar}" class="btn btn-nova-conta">
                    Nova Conta
                </a>
            </div>
        </form>

        <h2>Tabela de Contas Registradas</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>CPF</th>
                        <th>Nome</th>
                        <th>Celular</th>
                        <th>Número</th>
                        <th>Aberta?</th>
                        <th>Comandos</th>
                    </tr>
                </thead>
                <tbody>
                    
                    <tr th:each="conta : ${contas}">
                        <td th:text="${conta.cliente.cpf}">000.000.000-00</td>
                        
                        <td th:text="${conta.cliente.nome}">Nome do Cliente</td>
                        
                        <td th:text="${conta.cliente.celular}">(00) 00000-0000</td>
                        
                        <td th:text="${conta.numero}">000</td>
                        
                        <td th:text="${conta.status == T(br.com.trabalhopoo.mybar.model.enums.Status).ABERTA ? 'Sim' : 'Não'}"></td>
                        
                        <td class="commands">
                            <a th:href="@{/contas/{id}/visualizar(id=${conta.id})}" class="btn-action btn-view">Visualizar</a>
                            <a th:href="@{/contas/{id}/editar(id=${conta.id})}" class="btn-action btn-edit">Alterar</a>
                            <a th:href="@{/contas/{id}/excluir(id=${conta.id})}" class="btn-action btn-delete">Excluir</a>
                            <a th:href="@{/contas/{id}/itens(id=${conta.id})}" class="btn-action btn-item">Lançar Item</a>
                            <a th:href="@{/contas/{id}/fechar(id=${conta.id})}" class="btn-action btn-close">Fechar Conta</a>
                        </td>
                    </tr>

                    </tbody>
            </table>
        </div>

    </div>
    <script>
    document.getElementById('formPesquisa').addEventListener('submit', function(e) {
        // Seleciona todos os inputs e selects dentro do formulário
        const inputs = this.querySelectorAll('input, select');
        
        inputs.forEach(input => {
            // Se o campo estiver totalmente vazio ou apenas com espaços
            if (!input.value.trim()) {
                // Desabilita o campo temporariamente para o navegador não enviá-lo
                input.disabled = true;
            }
        });
    });
</script>

</body>
</html>
