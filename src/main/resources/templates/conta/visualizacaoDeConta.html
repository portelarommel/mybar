<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Visualização de Conta</title>
    <link rel="stylesheet" th:href="@{/css/novoOuAlteraObjetoEstilo.css}">
    
    <style>
        /* Estilização para manter a identidade do botão de retorno em vinho */
        .btn-voltar {
            display: inline-block;
            background-color: #991b1b;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 25px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }
        .btn-voltar:hover {
            background-color: #7f1d1d;
        }

        /* Garante o feedback visual cinza de campo bloqueado */
        input[readonly], select[disabled] {
            background-color: #f3f4f6;
            color: #4b5563;
            cursor: not-allowed;
        }
    </style>
</head>
    <body>
        <div class="page-centralizada">
            <div class="container">
                <h2>Tela de Visualização Conta</h2>
                <form th:object="${contaDto}">

        <div class="form-group">
            <label for="cpf">CPF</label>
            <input
                type="text"
                id="cpf"
                th:field="*{cpfCliente}"
                readonly>
        </div>

        <div class="form-group">
            <label for="nome">Nome</label>
            <input
                type="text"
                id="nome"
                th:field="*{nomeCliente}"
                readonly>
        </div>

        <div class="form-group">
            <label for="celular">Celular</label>
            <input
                type="tel"
                id="celular"
                th:field="*{celularCliente}"
                readonly>
        </div>

        <div class="form-group">
            <label for="sexo">Sexo</label>
            <input
                type="text"
                id="sexo"
                th:field="*{sexoCliente}"
                readonly>
        </div>
        <div class="form-group">
            <label for="data">Data de Abertura</label>
            <input
                type="text"
                id="data"
                th:value="${#temporals.format(contaDto.data, 'dd/MM/yyyy')}"
                readonly>
        </div>

        <div class="form-group">
            <label for="hora">Hora de Abertura</label>
            <input
                type="text"
                id="hora"
                th:value="${#temporals.format(contaDto.hora, 'HH:mm')}"
                readonly>
        </div>

        <div class="form-group">
            <label for="numeroConta">Número da Conta</label>
            <input
                type="number"
                id="numeroConta"
                th:field="*{numeroConta}"
                readonly>
        </div>

        <div class="form-group">
            <label for="codigoGarcom">Código do Garçom</label>
            <input
                type="text"
                id="codigoGarcom"
                th:field="*{codigoGarcom}"
                readonly>
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <input
                type="password"
                id="senha"
                th:field="*{senha}"
                readonly>
        </div>

        <div class="buttons-bar">
            <a th:href="@{/contas}" class="btn-voltar">
                Voltar para Gestão
            </a>
        </div>

    </form>

        </div>
    </div>
</body>
</html>
