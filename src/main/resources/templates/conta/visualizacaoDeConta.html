<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Visualização de Conta</title>
    <link rel="stylesheet" th:href="@{/css/novoOuAlteraObjetoEstilo.css}">
    
    <style>
        /* Estilização para manter a identidade do botão de retorno em vinho */
        .btn-voltar {
            display: inline-block;
            background-color: #991b1b;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 25px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }
        .btn-voltar:hover {
            background-color: #7f1d1d;
        }

        /* Garante o feedback visual cinza de campo bloqueado */
        input[readonly], select[disabled] {
            background-color: #f3f4f6;
            color: #4b5563;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="page-centralizada">
        <div class="container">
            <h2>Tela de Visualização Conta</h2>
        
            <form action="#" method="GET">
                
                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="123.456.789-10" readonly>
                </div>

                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" placeholder="Nome do cliente" maxlength="255" readonly>
                </div>

                <div class="form-group">
                    <label for="celular">Celular</label>
                    <input type="tel" id="celular" name="celular" placeholder="86 98888-8888" readonly>
                </div>

                <div class="form-group">
                    <label for="sexo">Sexo</label>
                    <select id="sexo" name="sexo" disabled>
                        <option value="">Selecione...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="data">Data</label>
                    <input type="date" id="data" name="data" readonly>
                </div>

                <div class="form-group">
                    <label for="hora">Hora</label>
                    <input type="time" id="hora" name="hora" readonly>
                </div>

                <div class="form-group">
                    <label for="numeroConta">Número Conta</label>
                    <input type="number" id="numeroConta" name="numeroConta" placeholder="Ex: 120" readonly>
                </div>

                <div class="form-group">
                    <label for="codigoGarcom">Código Garçom</label>
                    <input type="text" id="codigoGarcom" name="codigoGarcom" placeholder="Ex: 1010" readonly>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="••••" readonly>
                </div>

                <div class="buttons-bar">
                    <a href="/contas" class="btn-voltar">Voltar para Gestão</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
