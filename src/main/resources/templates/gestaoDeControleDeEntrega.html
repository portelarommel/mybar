<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Tela de Controle de Entregas</title>
    
    <link rel="stylesheet" href="/css/cardapio.css">
    
    <link rel="stylesheet" href="/css/novoOuAlteraObjetoEstilo.css">
</head>
<body>

    <div class="container" style="max-width: 1200px; margin: 0 auto;">
        
        <h2>Tela de Controle de Entregas</h2>
        
        <fieldset style="border: 1px solid #e5e7eb; padding: 20px; border-radius: 6px; margin-bottom: 30px;">
            <legend style="padding: 0 10px; font-weight: bold; color: #4b5563;">Pesquisar Pedidos</legend>
            
            <form action="#" method="GET">
                <div class="pesquisa-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label for="conta">Conta</label>
                        <input type="text" id="conta" name="conta" placeholder="120 (número com até 4 dígitos)" maxlength="4">
                    </div>
                    <div class="form-group">
                        <label for="cliente">Cliente</label>
                        <input type="text" id="cliente" name="cliente" placeholder="Raimundo Moura">
                    </div>
                </div>

                <div class="buttons-bar" style="margin-top: 15px; text-align: left;">
                    <button type="submit" class="btn-salvar" style="width: auto; padding: 10px 30px;">&lt; Pesquisar &gt;</button>
                </div>
            </form>
        </fieldset>

        <h3 style="margin-bottom: 15px; color: #111;">Pedidos</h3>
        <div class="table-responsive" style="margin-bottom: 40px; overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                <thead>
                    <tr style="background-color: #f3f4f6; text-align: left;">
                        <th style="padding: 12px; border: 1px solid #e5e7eb;">Conta</th>
                        <th style="padding: 12px; border: 1px solid #e5e7eb;">Tipo</th>
                        <th style="padding: 12px; border: 1px solid #e5e7eb;">Descrição</th>
                        <th style="padding: 12px; border: 1px solid #e5e7eb;">Data e Hora</th>
                        <th style="padding: 12px; border: 1px solid #e5e7eb;">Status</th>
                        <th style="padding: 12px; border: 1px solid #e5e7eb;">Comandos</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>

        <fieldset style="border: 1px solid #e5e7eb; padding: 20px; border-radius: 6px;">
            <legend style="padding: 0 10px; font-weight: bold; color: #4b5563;">Registrar Entrega</legend>
            
            <form action="#" method="POST">
                <div class="pesquisa-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">
                    <div class="form-group">
                        <label for="codigoGarcom">Código Garçom</label>
                        <input type="text" id="codigoGarcom" name="codigoGarcom" placeholder="1001 (número com até 4 dígitos)">
                    </div>
                    <div class="form-group">
                        <label for="nomeGarcom">Nome Garçom</label>
                        <input type="text" id="nomeGarcom" name="nomeGarcom" placeholder="João Aranha">
                    </div>
                </div>

                <div class="pesquisa-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div class="form-group">
                        <label for="codigoAtendente">Código Atendente</label>
                        <input type="text" id="codigoAtendente" name="codigoAtendente" placeholder="1010 (número com até 4 dígitos)">
                    </div>
                    <div class="form-group">
                        <label for="senhaAtendente">Senha Atendente</label>
                        <input type="password" id="senhaAtendente" name="senhaAtendente" placeholder="9999 (número com até 4 dígitos)">
                    </div>
                </div>

                <div class="buttons-bar" style="text-align: center;">
                    <button type="submit" class="btn-salvar" style="max-width: 320px;">&lt; Registrar Entrega &gt;</button>
                </div>
            </form>
        </fieldset>

    </div>

</body>
</html>
