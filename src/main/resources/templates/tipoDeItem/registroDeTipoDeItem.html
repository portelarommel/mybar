<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Tela de Inclusão de Tipos</title>
    <link rel="stylesheet" th:href="@{/css/novoOuAlteraObjetoEstilo.css}">
</head>
<body>
    <div class="page-centralizada">
        <div class="container">
            <h2>Tela de Inclusão de Tipos</h2>
            
            <form th:action="@{/tipos-item/registro}" th:object="${tipoItem}" method="POST">
                
                <div class="form-group">
                    <label for="codigo">Código <span class="required">*</span></label>
                    <input type="text" id="codigo" th:field="*{codigo}" required 
                           pattern="[0-9]{4}" maxlength="4" placeholder="10 (número com 4 dígitos, alterável apenas na inclusão de tipos)">
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição <span class="required">*</span></label>
                    <input type="text" id="descricao" th:field="*{descricao}" required 
                           maxlength="255" placeholder="Bebida (texto com 255 caracteres)">
                </div>

                <div class="form-group">
                    <label for="gorjeta">Gorjeta <span class="required">*</span></label>
                    <input type="text" id="gorjeta" th:field="*{gorjeta}" required 
                           placeholder="10% (percentual)">
                </div>
                
                <div class="form-group">
                    <label for="cozinha">Cozinha <span class="required">*</span></label>
                    <select id="cozinha" th:field="*{cozinha}" required>
                        <option value="">[Selecione]</option>
                        <option value="true">Sim</option>
                        <option value="false">Não</option>
                    </select>
                </div>

                <div class="buttons-bar">
                    <button type="submit" class="btn-salvar">&lt; Salvar &gt;</button>
                    <a th:href="@{/tipos-item}" style="display: block; margin-top: 15px; color: #4b5563; font-size: 14px; text-decoration: underline;">Voltar para Lista de Tipos</a>
                </div>
                
                <div class="footer-note">
                    Os campos marcados com <span class="required">*</span> são de preenchimento obrigatório.
                </div>
                
            </form>
        </div>
    </div>
</body>
</html>
