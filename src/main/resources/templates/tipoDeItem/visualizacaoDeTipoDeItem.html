<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Visualização de Tipo de Item</title>
    <link rel="stylesheet" th:href="@{/css/novoOuAlteraObjetoEstilo.css}">
    
    <style>
        /* Botão de retorno integrado à paleta Vinho do MyBar */
        .btn-voltar {
            display: inline-block;
            background-color: #991b1b;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 25px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }
        .btn-voltar:hover {
            background-color: #7f1d1d;
        }

        /* Feedback visual cinza de campo bloqueado (apenas leitura) */
        input[readonly], select[disabled] {
            background-color: #f3f4f6;
            color: #4b5563;
            cursor: not-allowed;
            border-color: #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="page-centralizada">
        <div class="container">
            <h2>Tela de Visualização de Tipo de Item</h2>
        
            <form th:object="${tipoItem}">
                
                <div class="form-group">
                    <label for="codigo">Código</label>
                    <input type="text" id="codigo" th:field="*{codigo}" readonly="readonly">
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <input type="text" id="descricao" th:field="*{descricao}" readonly="readonly">
                </div>

                <div class="form-group">
                    <label for="gorjeta">Gorjeta</label>
                    <input type="text" id="gorjeta" th:field="*{gorjeta}" readonly="readonly">
                </div>
                
                <div class="form-group">
                    <label for="cozinha">Cozinha</label>
                    <select id="cozinha" th:field="*{cozinha}" disabled="disabled">
                        <option value="">[Selecione]</option>
                        <option value="true">Sim</option>
                        <option value="false">Não</option>
                    </select>
                </div>

                <div class="buttons-bar" style="margin-top: 25px;">
                    <a th:href="@{/tipos-item}" class="btn-voltar">&lt; Voltar para Lista de Tipos &gt;</a>
                </div>
                
            </form>
        </div>
    </div>
</body>
</html>
