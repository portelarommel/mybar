<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Gestão de Tipos de Itens</title>
    <link rel="stylesheet" th:href="@{/css/gestaoEstilo.css}">
</head>
<body>

    <div class="container">
        <h2>Tela de Gestão de Tipos de Itens</h2>
        
        <form id="formTipoItem" th:action="@{/tipos-item}" method="GET">
            <div class="pesquisa-grid">
                <div class="form-group">
                    <label for="descricao">Descrição por Tipo</label>
                    <input type="text" id="descricao" name="descricao" th:value="${param.descricao}" placeholder="Bebida (texto com até 255 caracteres)" maxlength="255">
                </div>
            </div>

            <div class="buttons-bar">
                <button type="submit" class="btn btn-pesquisar">&lt; Pesquisar &gt;</button>
                <a th:href="@{/tipos-item/registro}" class="btn btn-nova-conta">&lt; Novo Tipo &gt;</a>
            </div>
        </form>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Descrição</th>
                        <th>Cozinha?</th>
                        <th>Gorjeta</th>
                        <th>Comandos</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tipo : ${TipoItens}">
                        <td th:text="${tipo.codigo}">10</td>
                        <td th:text="${tipo.descricao}">Bebida</td>
                        <td th:text="${tipo.cozinha ? 'Sim' : 'Não'}">Sim</td>
                        <td th:text="${tipo.gorjeta}">10%</td>
                        
                        <td>
                            <a th:href="@{/tipos-item/{id}/visualizar(id=${tipo.id})}" class="btn-links" style="margin-right: 10px; color: #10b981; text-decoration: none;">&lt; Visualizar &gt;</a>

                            <a th:href="@{/tipos-item/{id}/editar(id=${tipo.id})}" class="btn-links" style="margin-right: 10px; color: #2563eb; text-decoration: none;">&lt; Alterar &gt;</a>
                            
                            <form th:action="@{/tipos-item/{id}/excluir(id=${tipo.id})}" th:method="post" style="display: inline;">
                                <button type="submit" class="btn-links" style="color: #991b1b; background: none; border: none; cursor: pointer; font-family: inherit; font-size: inherit; padding: 0;" onclick="return confirm('Tem certeza que deseja excluir este tipo de item?')">&lt; Excluir &gt;</button>
                            </form>
                        </td>
                    </tr>
                    
                    <tr th:if="${#lists.isEmpty(TipoItens)}">
                        <td colspan="5" style="text-align: center; color: #6b7280; padding: 20px;">Nenhum tipo de item encontrado.</td>
                    </tr>
                </tbody>
            </table>
        </div>
             <div class="buttons-bar">
    
    <a th:href="@{/}" class="btn btn-voltar-dashboard">&lt; Voltar para Dashboard &gt;</a>
</div>

    </div>
        <script>
    document.getElementById('formTipoItem').addEventListener('submit', function(e) {
        // Seleciona todos os inputs e selects dentro do formulário
        const inputs = this.querySelectorAll('input, select');
        
        inputs.forEach(input => {
            // Se o campo estiver totalmente vazio ou apenas com espaços
            if (!input.value.trim()) {
                // Desabilita o campo temporariamente para o navegador não enviá-lo
                input.disabled = true;
            }
        });
    });
</script>

</body>
</html>
