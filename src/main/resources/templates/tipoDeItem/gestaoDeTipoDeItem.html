<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Gestão de Tipos de Itens</title>
    <link rel="stylesheet" href="/css/gestaoEstilo.css">
</head>
<body>

    <div class="container">
        <h2>Tela de Gestão de Tipos de Itens</h2>
        
        <form action="#" method="GET">
            <div class="pesquisa-grid">
                <div class="form-group">
                    <label for="descricao">Descrição por Tipo</label>
                    <input type="text" id="descricao" name="descricao" placeholder="Bebida (texto com até 255 caracteres)" maxlength="255">
                </div>
            </div>

            <div class="buttons-bar">
                <button type="submit" class="btn btn-pesquisar">&lt; Pesquisar &gt;</button>
                <a href="/tipos/novo" class="btn btn-nova-conta">&lt; Novo Tipo &gt;</a>
            </div>
        </form>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Descrição</th>
                        <th>Cozinha?</th>
                        <th>Gorjeta</th>
                        <th>Comandos</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>

    </div>

</body>
</html>
