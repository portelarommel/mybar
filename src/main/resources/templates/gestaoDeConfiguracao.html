<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Configuração do Sistema</title>
    <link rel="stylesheet" th:href="@{/css/novoOuAlteraObjetoEstilo.css}">
</head>
<body>

    <div class="container" style="max-width: 600px; margin: 40px auto;" th:object="${configuracao}">
        <h2>Configuração do Sistema</h2>

        <!-- Sempre visível: preço dos ingressos -->
        <fieldset style="border: 1px solid #e5e7eb; padding: 20px; border-radius: 6px; margin-bottom: 30px;">
            <legend style="padding: 0 10px; font-weight: bold; color: #4b5563;">Configuração de Ingresso</legend>
            <form th:action="@{/configuracao/ingressos}" method="POST">
                <div class="form-group">
                    <label for="ingressoMasculino">Ingresso Masculino <span class="required">*</span></label>
                    <input type="number" id="ingressoMasculino" name="valorIngressoMasc"
                           th:value="*{valorIngressoMasc}" step="0.01" min="0" placeholder="R$ 50,00" required>
                </div>
                <div class="form-group">
                    <label for="ingressoFeminino">Ingresso Feminino <span class="required">*</span></label>
                    <input type="number" id="ingressoFeminino" name="valorIngressoFemin"
                           th:value="*{valorIngressoFemin}" step="0.01" min="0" placeholder="R$ 10,00" required>
                </div>
                <div class="buttons-bar" style="margin-top: 15px;">
                    <button type="submit" class="btn-salvar">&lt; Salvar &gt;</button>
                </div>
            </form>
        </fieldset>

<fieldset th:if="*{modoOperacao == T(br.com.trabalhopoo.mybar.model.enums.ModoOperacao).GESTAO}"
          style="border: 1px solid #e5e7eb; padding: 20px; border-radius: 6px; margin-bottom: 30px;">
    <legend style="padding: 0 10px; font-weight: bold; color: #d97706;">Liberação de Atendimentos</legend>

    <p th:if="${configuracao.dataFechamento != null}" style="font-size: 14px; color: #6b7280; margin-top: 0;">
        Último fechamento:
        <strong th:text="|${#temporals.format(configuracao.dataFechamento, 'dd/MM/yyyy')} às ${#temporals.format(configuracao.horaFechamento, 'HH:mm')}|"></strong>
    </p>

    <p style="font-size: 14px; color: #6b7280; margin-top: 0;">
        Os atendimentos serão liberados imediatamente, com a data e hora atuais do servidor.
    </p>

    <form th:action="@{/configuracao/liberar}" method="POST">
        <div class="buttons-bar" style="margin-top: 15px;">
            <button type="submit" class="btn-salvar" style="background-color: #2563eb;">&lt; Liberar Atendimentos &gt;</button>
        </div>
    </form>
</fieldset>

        <!-- Só aparece em modo ATENDIMENTO: nunca ao mesmo tempo que Liberação -->
        <fieldset th:if="*{modoOperacao == T(br.com.trabalhopoo.mybar.model.enums.ModoOperacao).ATENDIMENTO}"
                  style="border: 1px solid #e5e7eb; padding: 20px; border-radius: 6px; margin-bottom: 30px;">
            <legend style="padding: 0 10px; font-weight: bold; color: #b91c1c;">Fechamento de Atendimentos</legend>
            <form th:action="@{/configuracao/fechar}" method="POST">
                <div class="form-group">
                    <label for="dataFechamento">Data de Abertura</label>
                    <input type="text" id="dataFechamento"
                           th:value="${#temporals.format(configuracao.data, 'dd/MM/yyyy')}" readonly>
                </div>
                <div class="form-group">
                    <label for="horaFechamento">Hora de Abertura</label>
                    <input type="text" id="horaFechamento"
                           th:value="${#temporals.format(configuracao.hora, 'HH:mm')}" readonly>
                </div>
                <div class="buttons-bar" style="margin-top: 15px;">
                    <button type="submit" class="btn-salvar" style="background-color: #b91c1c;">&lt; Fechar Atendimentos &gt;</button>
                </div>
            </form>
        </fieldset>

        <div class="buttons-bar" style="text-align: center;">
            <a th:href="@{/}" style="color: #4b5563; font-size: 14px; text-decoration: underline;">Voltar para Dashboard</a>
        </div>

    </div>

</body>
</html>
