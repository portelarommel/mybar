<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Visualização de Item</title>
    <link rel="stylesheet" th:href="@{/css/novoOuAlteraObjetoEstilo.css}">
    
    <style>
        /* Botão de retorno integrado à paleta Vinho do MyBar */
        .btn-voltar {
            display: inline-block;
            background-color: #991b1b;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 25px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }
        .btn-voltar:hover {
            background-color: #7f1d1d;
        }

        /* Feedback visual cinza de campo bloqueado (apenas leitura) */
        input[readonly], select[disabled] {
            background-color: #f3f4f6;
            color: #4b5563;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="page-centralizada">
        <div class="container">
            <h2>Tela de Visualização de Item</h2>
        
            <form th:object="${itemCardapio}" method="GET">
                
                <div class="form-group">
                    <label for="codigo">Código</label>
                    <input type="text" id="codigo" th:field="*{codigo}" readonly>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <input type="text" id="descricao" th:field="*{descricao}" readonly>
                </div>

                <div class="form-group">
                    <label for="tipoItem">Tipo</label>
                    <select id="tipoItem" th:field="*{tipoItem.id}" disabled>
                        <option th:value="*{tipoItem != null ? tipoItem.id : ''}" 
                                th:text="*{tipoItem != null ? tipoItem.descricao : '[Sem Tipo]'}">
                            Bebida
                        </option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="valor">Valor Unitário</label>
                    <input type="number" id="valor" th:field="*{valor}" step="0.01" readonly>
                </div>

                <div class="form-group">
                    <label for="gorjeta">Gorjeta</label>
                    <input type="text" id="gorjeta" 
                           th:value="*{tipoItem != null ? tipoItem.gorjeta + '%' : '0%'}" readonly>
                </div>

                <div class="buttons-bar" style="margin-top: 25px;">
                    <a th:href="@{/itens-cardapio}" class="btn-voltar">&lt; Voltar para a Gestão &gt;</a>
                </div>
                
            </form>
        </div>
    </div>
</body>
</html>
