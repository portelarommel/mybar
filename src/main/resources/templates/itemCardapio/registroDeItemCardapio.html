<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Tela de Inclusão de Item</title>
    <link rel="stylesheet" href="/css/novoOuAlteraObjetoEstilo.css">
</head>
<body>
    <div class="page-centralizada">
        <div class="container">
        <h2>Tela de Inclusão de Item</h2>
        
        <form action="#" method="POST">
            
            <div class="form-group">
                <label for="codigo">Código <span class="required">*</span></label>
                <input type="text" id="codigo" name="codigo" required 
                       pattern="[0-9]{4}" maxlength="4" placeholder="Ex: 2010 (4 dígitos)">
            </div>

            <div class="form-group">
                <label for="descricao">Descrição <span class="required">*</span></label>
                <input type="text" id="descricao" name="descricao" required 
                       maxlength="255" placeholder="Ex: Coca-cola 290ml">
            </div>

            <div class="form-group">
                <label for="tipoItem">Tipo <span class="required">*</span></label>
                <select id="tipoItem" name="tipoItem" required>
                    <option value="">[Tipos de Itens]</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="valor">Valor Unitário <span class="required">*</span></label>
                <input type="number" id="valor" name="valor" step="0.01" min="0" 
                       required placeholder="R$ 0,00">
            </div>

            <div class="form-group">
                <label for="gorjeta">Gorjeta <span class="required">*</span></label>
                <input type="text" id="gorjeta" name="gorjeta" required 
                       placeholder="Ex: 10%">
            </div>

            <div class="buttons-bar">
                <button type="submit" class="btn-salvar">&lt; Salvar &gt;</button>
                <a href="/cardapio" style="display: block; margin-top: 15px; color: #4b5563; font-size: 14px; text-decoration: underline;">Voltar para o Cardápio</a>
            </div>
            
            <div class="footer-note">
                Os campos marcados com <span class="required">*</span> são de preenchimento obrigatório.
            </div>
            
        </form>

        </div>

    </div>

</body>
</html>
