<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBar - Gestão de Itens do Cardápio</title>
    <link rel="stylesheet" th:href="@{/css/gestaoEstilo.css}">
</head>
<body>

    <div class="container">
        <h2>Tela de Gestão de Itens do Cardápio</h2>
        
        <form th:action="@{/itens-cardapio}" method="GET">
            <div class="pesquisa-grid">
                <div class="form-group">
                    <label for="codigo">Código</label>
                    <input type="text" id="codigo" name="codigo" th:value="${param.codigo}" placeholder="120 (até 4 dígitos)" maxlength="4">
                </div>
                
                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <input type="text" id="descricao" name="descricao" th:value="${param.descricao}" placeholder="(até 255 caracteres)" maxlength="255">
                </div>
                
                <div class="form-group">
                    <label for="tipoItem">Tipo de Item</label>
                    <select id="tipoItem" name="tipoItemId">
                        <option value="">[Selecione o Tipo]</option>
                        </select>
                </div>
            </div>

            <div class="buttons-bar">
                <button type="submit" class="btn btn-pesquisar">&lt; Pesquisar &gt;</button>
                <a th:href="@{/itens-cardapio/registrar}" class="btn btn-nova-conta">&lt; Novo Item &gt;</a>
            </div>
        </form>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Descrição</th>
                        <th>Tipo</th>
                        <th>Valor Unitário</th>
                        <th>Gorjeta</th>
                        <th>Comandos</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${itensCardapio}">
                        <td th:text="${item.codigo}">1010</td>
                        <td th:text="${item.descricao}">Coca-cola 290ml</td>
                        
                        <td th:text="${item.tipoItem != null ? item.tipoItem.descricao : 'Sem Tipo'}">Bebida</td>
                        
                        <td th:text="${#numbers.formatDecimal(item.valor, 1, 'POINT', 2, 'COMMA')}">8,00</td>
                        
                        <td th:text="${item.tipoItem != null ? item.tipoItem.gorjeta + '%' : '0%'}">10%</td>
                        
                        <td>
                            <a th:href="@{/itens-cardapio/{id}/visualizar(id=${item.id})}" class="link-comando">&lt;Visualizar&gt;</a>
                            <a th:href="@{/itens-cardapio/{id}/editar(id=${item.id})}" class="link-comando">&lt;Alterar&gt;</a>
                            <a th:href="@{/itens-cardapio/{id}/excluir(id=${item.id})}" class="link-comando" style="font-weight: bold; color: black;">&lt;Excluir&gt;</a>
                        </td>
                    </tr>
                    
                    <tr th:if="${#lists.isEmpty(itensCardapio)}">
                        <td colspan="6" style="text-align: center; color: #6b7280; padding: 20px;">Nenhum item encontrado no cardápio.</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="buttons-bar">
            <a th:href="@{/}" class="btn btn-voltar-dashboard">&lt; Voltar para Dashboard &gt;</a>
        </div>

    </div>

</body>
</html>
